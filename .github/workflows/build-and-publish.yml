name: Build and Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pams-harvestcraft-jars
          path: build/libs/pams-harvestcraft-*.jar
          if-no-files-found: error

  publish:
    name: Publish to Modrinth
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: ./gradlew build

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: pams-harvestcraft
          modrinth-token: ${{ secrets.MODRINTH_API_TOKEN }}
          files: build/libs/pams-harvestcraft-*.jar
          files-secondary: ''
          name: Pam's HarvestCraft ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
          game-versions: 1.20.1
          loaders: forge
          java: 17

      - name: Trigger modpack update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: brooswit/minecraft-modpack
          event-type: pams-harvestcraft-updated
          client-payload: '{"version": "${{ github.ref_name }}"}'
